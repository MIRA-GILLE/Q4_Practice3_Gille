    <h2>JavaScript For Loop</h2>

    <p id="sample"></p>

    <script>
        let Sample= "";

        for (let z = 0; z < 3; z++) {
        Sample += "The number is " + z + "<br>";
        }

        document.getElementById("sample").innerHTML = Sample;
    </script>
