<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4Practice3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <hr>
    <h2>Login Section</h2>
    <input type="text" id="uname" placeholder="Username"><br>
    <input type="password" id="pwd" placeholder="Password"><br>
    <button id="loginBTN" onclick="authenticate()">Login</button>

    <p id="display" class="fst-italic text-warning"></p>

    <script>
        // We must define this OUTSIDE the function so it persists between clicks
        let attempt_counter = 0;

        function authenticate() {
            var username, pwd, granted, denied;
            username = document.getElementById("uname").value;
            pwd = document.getElementById("pwd").value;
            granted = "Welcome " + username + "!";
            denied = "Access Denied";
        
            // Check credentials
            if (username === "Ayokona" && pwd === "y0k0n4r1n") {
                alert(granted);
                attempt_counter = 0; 
                document.getElementById("display").innerHTML = "";
            } else {
                attempt_counter++;
                document.getElementById("display").innerHTML =
                    "Incorrect username and/or password. Attempt " + attempt_counter + " of 3 ";
            }

            // Lock after max attempts
            if (attempt_counter >= 3) {
                alert(denied);
                document.getElementById("loginBTN").disabled = true;
            }
        }
    </script>
</body>
</html>
