<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4Practice3</title>
</head>
<body>

    <h2>JavaScript For Loop</h2>
    <p id="sample1"></p>

    <script>
        let text1 = "";
        for (let z = 0; z < 3; z++) {
            text1 += "The number is " + z + "<br>";
        }
        document.getElementById("sample1").innerHTML = text1;
    </script>


    <h2>JavaScript While Loop</h2>
    <p id="sample2"></p> <script>
        let text2 = "";
        let y = 0;
        while (y < 5) {
            text2 += "The number is " + y + "<br>";
            y++;
        }
        document.getElementById("sample2").innerHTML = text2;
    </script>
 
    <h2>JavaScript do-while Loop</h2>
    <p id="sample3"></p>

    <script>
        let text3 = "";
        let i = 0; 

        do {
            text3 += "The number is " + i + "<br>";
            i++; 
        }
        while (i < 5);  

        document.getElementById("sample3").innerHTML = text3;
    </script>

</body>
</html>
